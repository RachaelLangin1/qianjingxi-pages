<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

  <title>助农扶贫后台管理 - 连接城乡，爱心助农</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
      background: linear-gradient(135deg, #fff7fb 0%, #effff8 52%, #f6f2ff 100%);
    }

    .loader-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      max-width: 360px;
      padding: 0 20px;
    }

    #loader {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 44px;
      margin: 0 auto 20px;
    }

    #loader div {
      width: 10px;
      height: 10px;
      background: var(--primary-color);
      border-radius: 50%;
      box-shadow: 0 6px 14px rgba(255, 124, 173, 0.24);
      animation: loader-dot 0.9s ease-in-out infinite;
    }

    #loader div:nth-child(2) {
      background: var(--secondary-color);
      animation-delay: 0.12s;
    }

    #loader div:nth-child(3) {
      background: var(--accent-color);
      animation-delay: 0.24s;
    }

    @keyframes loader-dot {
      0%,
      80%,
      100% {
        transform: translateY(0) scale(0.86);
        opacity: 0.62;
      }

      40% {
        transform: translateY(-10px) scale(1);
        opacity: 1;
      }
    }

    .load-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
      margin: 0 0 8px;
    }

    .load-subtitle {
      font-size: 14px;
      color: var(--text-medium);
      margin: 0;
      line-height: 1.6;
    }

    .loaded #loader-wrapper {
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s ease-out;
    }

    .loaded .loader-container {
      transform: translate(-50%, -50%) scale(0.95);
      opacity: 0;
      transition: all 0.4s ease;
    }

    /* 品牌色 */
    :root {
      --primary-color: #ff7cad;
      --secondary-color: #58c9a6;
      --accent-color: #8b79ff;
      --text-dark: #3d3146;
      --text-medium: #74667d;
      --bg-light: #fff7fb;
    }
  </style>
  <script type="module" crossorigin src="/qianjingxi-pages/admin/static/js/index-D5lkjpP8.js"></script>
  <link rel="stylesheet" crossorigin href="/qianjingxi-pages/admin/static/css/index-h82bWGtm.css">
</head>

<body>
<div id="app">
  <div id="loader-wrapper">
    <div class="loader-container">

      <div id="loader"><div></div><div></div><div></div></div>

      <h1 class="load-title">助农扶贫后台管理</h1>
      <p class="load-subtitle">正在准备一个更轻快的工作台</p>
    </div>
  </div>
</div>

</body>

</html>
